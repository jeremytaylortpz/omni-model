base_view: student_profiles
label: Beyond Possible Data

fields:
  [
    all_views.*,
    -courses.course_type_id,
    -courses.created_at,
    -courses.description,
    -courses.class_length,
    -languages.created_at,
    -languages.code,
    -languages.ui_strings,
    -languages.updated_at,
    -languages.count,
    -demographic_profiles.created_at,
    -demographic_profiles.updated_at,
    -demographic_profiles.count,
    -people.calculation,
    -people.id_count_distinct,
    -people.count,
    -races.race_list,
    -races.count,
    -races.updated_at,
    -races.created_at,
    -registrations.active_count_false,
    -registrations.person_id_count_distinct,
    -registrations.count,
    -registrations.updated_at,
    -term_sorting_v2.*
  ]

joins:
  schools: {}
  people:
    registrations:
      courses:
        schedules: {}
        terms: {}
        course_types: {}
    demographic_profiles:
      races: {}
    omni__clean_attendance_query_view: {}
    omni__all_survey_data_with_demos:
      term_sorting_v2: {}
  sites:
    form_submissions:
      languages: {}

ai_context: |
  Student-centric topic with the full student attribute surface. Grain: one row per student (`student_profiles.id`, joined to `people` on `person_id`). Joined out to schools, demographics, races, languages, registrations, courses, attendance, and surveys. Use for student rosters, current-grade / school / consent breakdowns, and joining demographics to outcomes. Apply `student_profiles.school_release_consent=TRUE` when reporting externally per the model.yaml PII rule.

ai_fields:
  [
    student_profiles.*,
    -student_profiles.student_phone,
    -student_profiles.student_primary_contact_phone,
    -student_profiles.student_email,
    -student_profiles.student_primary_contact_email,
    -student_profiles.student_primary_contact_email_full_name,
    -student_profiles.student_primary_contact_phone_full_name,
    -student_profiles.notes,
    -student_profiles.student_phone_original_id,
    -student_profiles.student_email_original_id,
    schools.*,
    -schools.created_at,
    -schools.updated_at,
    people.id,
    people.date_of_birth,
    -people.first_name,
    -people.last_name,
    -people.full_name,
    -people.middle_name,
    -people.preferred_name,
    -people.calculation,
    -people.student_name,
    registrations.active,
    registrations.context_type,
    registrations.person_id,
    courses.friendly_name,
    courses.course_code,
    courses.exclude_course,
    courses.max_days,
    schedules.*,
    terms.name,
    terms.start_date,
    terms.end_date,
    terms.year,
    course_types.*,
    demographic_profiles.gender,
    demographic_profiles.ethnicity,
    demographic_profiles.*,
    races.name,
    omni__clean_attendance_query_view.*,
    -omni__clean_attendance_query_view.att_P,
    -omni__clean_attendance_query_view.att_H,
    -omni__clean_attendance_query_view.att_A,
    omni__all_survey_data_with_demos.*,
    -omni__all_survey_data_with_demos.first_name,
    -omni__all_survey_data_with_demos.last_name,
    term_sorting_v2.*,
    sites.name,
    languages.name
  ]
