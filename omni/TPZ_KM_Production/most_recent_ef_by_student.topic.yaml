base_view: most_recent_ef_by_student
label: Most Recent EF by Student

fields:
  [
    all_views.*,
    -courses.*,
    -most_recent_ef_by_student.*,
    -people.*,
    people.full_name,
    -registrations.*,
    registrations.active,
    -terms.*,
    terms.current_term_label,
    most_recent_ef_by_student.release_media_groups,
    -most_recent_ef_by_student.release_media,
    -schools.*,
    schools.name_groups,
    -student_profiles.*,
    courses.friendly_name
  ]

joins:
  people:
    registrations:
      courses:
        terms: {}
    student_profiles:
      schools: {}

ai_context: |
  One row per student × most-recent enrollment form (the latest EF submitted for each student across all terms). Use for current-roster questions: latest contact / consent / school / parent-guardian info, and current registration status. Do NOT use for historical per-term EF analysis — that requires the underlying `enrollment_forms` view, which has one row per student × term enrolled.
