base_view: interest_forms
label: Recruitment Pipeline

ai_fields:
  [
    interest_forms.*,
    -interest_forms.contact_email,
    -interest_forms.contact_first_name,
    -interest_forms.contact_last_name,
    -interest_forms.contact_phone,
    -interest_forms.student_first_name,
    -interest_forms.student_last_name,
    -interest_forms.student_phone,
    -interest_forms.student_email,
    -interest_forms.student_dob,
    -interest_forms.extra_notes,
    student_attendances.*,
    courses.*,
    terms.*,
    people.id,
    people.date_of_birth,
    -people.first_name,
    -people.last_name,
    -people.full_name,
    -people.middle_name,
    -people.preferred_name,
    -people.calculation,
    -people.student_name,
    student_profiles.*,
    -student_profiles.student_phone,
    -student_profiles.student_primary_contact_phone,
    -student_profiles.student_email,
    -student_profiles.student_primary_contact_email,
    -student_profiles.student_primary_contact_email_full_name,
    -student_profiles.student_primary_contact_phone_full_name,
    -student_profiles.notes,
    -student_profiles.student_phone_original_id,
    -student_profiles.student_email_original_id,
    schools.*,
    registrations.*,
    enrollment_forms.has_enrollment_form,
    enrollment_forms.term_name,
    enrollment_forms.term_year,
    enrollment_forms.submitted_at,
    enrollment_forms.person_id,
    enrollment_forms.student_grade,
    enrollment_forms.student_school,
    omni__all_survey_data_with_demos.*,
    term_sorting_v2.*
  ]

joins:
  student_attendances:
    courses:
      terms: {}
  people:
    student_profiles:
      schools: {}
    registrations: {}
    enrollment_forms: {}
    omni__all_survey_data_with_demos:
      term_sorting_v2: {}

ai_context: |
  Recruitment-pipeline topic. Grain: one row per person who has submitted an interest form (interest-form submission is what creates the `people` row in TPZ KM — one interest form per person). Use for funnel analyses across the student journey: interest → screening → enrollment → registration → attendance → survey. Joined out to `student_profiles`, `registrations`, `enrollment_forms`, attendance, and surveys via `people.id`.
