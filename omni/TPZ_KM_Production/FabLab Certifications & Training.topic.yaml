base_view: fablab_profiles
label: FabLab Certifications & Training
description: A comprehensive view of FabLab certifications, training programs,
  and participant journeys — covering equipment certifications, course
  enrollments, attendance, student profiles, and program pathways across FabLab
  locations.

fields:
  [
    all_views.*,
    -omni__all_survey_data_with_demos.numeric_value_weighted,
    -omni__all_survey_data_with_demos.numeric_value_weighted_average
  ]
ai_fields:
  [
    fablab_profiles.*,
    fablab_certifications.*,
    fablab_equipments.*,
    fablab_locations.*,
    fablab_equipment_types.*,
    people.id,
    people.date_of_birth,
    -people.first_name,
    -people.last_name,
    -people.full_name,
    -people.middle_name,
    -people.preferred_name,
    -people.calculation,
    -people.student_name,
    student_profiles.*,
    -student_profiles.student_phone,
    -student_profiles.student_primary_contact_phone,
    -student_profiles.student_email,
    -student_profiles.student_primary_contact_email,
    -student_profiles.student_primary_contact_email_full_name,
    -student_profiles.student_primary_contact_phone_full_name,
    -student_profiles.notes,
    -student_profiles.student_phone_original_id,
    -student_profiles.student_email_original_id,
    registrations.*,
    demographic_profiles.*,
    races.*,
    student_attendance_rates.*,
    courses.*,
    schedules.*,
    course_types.*,
    terms.*,
    student_first_terms.*
  ]

joins:
  fablab_certifications:
    fablab_equipments:
      fablab_locations: {}
      fablab_equipment_types: {}
  people:
    student_profiles: {}
    registrations: {}
    demographic_profiles:
      races: {}
    student_attendance_rates:
      courses:
        schedules: {}
        course_types: {}
      terms: {}
      student_first_terms: {}

ai_context: |-
  Use this topic to analyze FabLab certification and training data. Key use cases include:
  - **Certification tracking**: Use `fablab_certifications` and `fablab_equipment_types`/`fablab_equipments` to analyze which certifications participants have earned and on what equipment.
  - **Location-based analysis**: Use `fablab_locations` and `fablab_profiles` to filter or group by FabLab site.
  - `fablab_profiles` is the base view — all participant-level analysis should anchor here.
