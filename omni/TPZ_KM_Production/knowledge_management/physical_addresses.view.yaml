# Reference this view as physical_addresses
ai_context: |
  Mailing/home addresses linked to a person. Treat as PII; hide street/zip from aggregate reporting.

schema: knowledge_management

dimensions:
  street:
    hidden: true
  city: {}
  state: {}
  apt_number:
    hidden: true
  zip_code:
    hidden: true
  created_at: {}
  updated_at: {}
  is_mailing_address: {}

  id:
    format: ID
    primary_key: true

measures:
  count:
    aggregate_type: count
