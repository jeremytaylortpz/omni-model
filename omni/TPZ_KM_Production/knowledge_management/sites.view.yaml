# Reference this view as sites
ai_context: |
  Physical TPZ program sites (primarily the Jamaica Plain Innovation Center plus partner/school locations). Joined from `courses.site_id` and `student_site_assignments`.

schema: knowledge_management

dimensions:
  name: {}
  active: {}
  metadata: {}
  created_at: {}
  updated_at: {}
  code: {}
  sender_email: {}

  id:
    format: ID
    primary_key: true

measures:
  count:
    aggregate_type: count
