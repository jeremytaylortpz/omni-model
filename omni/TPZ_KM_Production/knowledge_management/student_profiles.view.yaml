# Reference this view as student_profiles
ai_context: |
  One row per `people` row that is a student, holding student-specific attributes (grade, school, consents, latest term) populated from interest and enrollment forms. Join to `people` on person_id. Exclude rows where `school_release_consent=FALSE` from external reporting.

schema: knowledge_management

dimensions:
  date_of_birth:
    hidden: true
  current_grade:
    sample_values:
      [
      "0",
      "2",
      "8",
      "9",
      "10",
      "11",
      "12",
      "13"
      ]
  school: {}
  iep: {}
  first_gen_college: {}
  dietary_restrictions: {}
  created_at: {}
  updated_at: {}
  pronouns: {}
  school_release_consent: {}
  referral: {}
  community_org_referral: {}
  notes:
    hidden: true
  interest_form_most_recent_submitted: {}
  enrollment_form_most_recent_submitted: {}
  enrollment_form_most_recent_status:
    ai_context: |
      Misleadingly named: this is an INT foreign key to `enrollment_forms.id` (the student's most recent enrollment form), not a status string. The `enrollment_forms` table has no status column, so the actual workflow status cannot be derived from this field alone. Treat as an id and avoid filtering on it.
    format: ID
  interest_form_most_recent_status:
    ai_context: |
      Misleadingly named: this is an INT foreign key to `interest_forms.id` (the student's most recent interest form), not a status string. Treat as an id.
    format: ID
  student_phone:
    hidden: true
  student_primary_contact_phone:
    hidden: true
  student_email:
    hidden: true
  student_primary_contact_email:
    hidden: true
  student_primary_contact_email_full_name:
    hidden: true
  student_primary_contact_phone_full_name:
    hidden: true
  latest_term: {}
  dismissed: {}
  citywide_release_consent: {}
  allergies: {}
  esl: {}

  id:
    format: ID
    primary_key: true

  person_id:
    format: ID

  powerschool_id:
    format: ID

  latest_term_id:
    format: ID

  student_email_original_id:
    format: ID

  student_phone_original_id:
    format: ID

  student_primary_contact_phone_original_id:
    format: ID

  student_primary_contact_email_original_id:
    format: ID

  student_type_id:
    format: ID

  school_id:
    format: ID

  site_id:
    format: ID

measures:
  count:
    aggregate_type: count
