  visitor_token: {}
  ip: {}
  user_agent: {}
  referrer: {}
  referring_domain: {}
  landing_page: {}
  browser: {}
  os: {}
  device_type: {}
  country: {}
  region: {}
  city: {}
  latitude: {}
  longitude: {}
  utm_source: {}
  utm_medium: {}
  utm_term: {}
  utm_content: {}
  utm_campaign: {}
  app_version: {}
  os_version: {}
  platform: {}
  started_at: {}

  id:
    format: ID
    primary_key: true

  dashboard_user_id:
    format: ID

measures:
  count:
    aggregate_type: count
