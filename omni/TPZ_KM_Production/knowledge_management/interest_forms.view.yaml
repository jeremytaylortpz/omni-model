# Reference this view as interest_forms
ai_context: |
  Flattened student interest-form submissions — one row per person. Interest-form submission is what creates the `people` row and starts the TPZ pipeline. Filled out by the prospective student; `has_interest_form` flags pipeline entry.

schema: knowledge_management

dimensions:
  term_name: {}
  term_year: {}
  contact_email:
    hidden: true
  contact_first_name:
    hidden: true
  contact_last_name:
    hidden: true
  contact_phone:
    hidden: true
  contact_language: {}
  contact_relationship: {}
  student_phone:
    hidden: true
  student_grade: {}
  student_school_raw: {}
  student_dob:
    hidden: true
  student_email:
    hidden: true
  extra_notes:
    hidden: true
  student_first_name:
    hidden: true
  student_last_name:
    hidden: true
  student_gender: {}
  other_school: {}
  student_language: {}
  student_pronouns: {}
  referral_source: {}
  created_at: {}
  updated_at: {}
  referral_community_org: {}
  submitted_at: {}

  id:
    format: ID
    primary_key: true

  person_id:
    format: ID

  has_interest_form:
    sql: NOT COALESCE(${interest_forms.person_id} IS NULL, FALSE)
    label: has_interest_form
    format: ""
    ai_context: TRUE if this person has submitted an interest form. Use for
      pipeline/funnel analysis.

  has_interest:
    sql: NOT COALESCE(${interest_forms.person_id} IS NULL, FALSE)
    label: has_interest
    format: ""
    hidden: true

  site_id:
    format: ID

measures:
  count:
    aggregate_type: count

  person_id_count_distinct:
    sql: ${interest_forms.person_id}
    aggregate_type: count_distinct

  has_interest_count_true:
    sql: ${interest_forms.has_interest}
    label: Has Interest True Count
    aggregate_type: count
    filters:
      has_interest:
        is: true
