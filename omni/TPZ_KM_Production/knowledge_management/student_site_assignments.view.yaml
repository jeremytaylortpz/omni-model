# Reference this view as student_site_assignments
ai_context: |
  Maps students to sites for a given period (which Innovation Center cohort/site a student is assigned to).

schema: knowledge_management

dimensions:
  assigned_at: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  person_id:
    format: ID

  site_id:
    format: ID

measures:
  count:
    aggregate_type: count
