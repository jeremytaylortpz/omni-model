# Reference this view as form_submissions
schema: knowledge_management

dimensions:
  status: {}
  smart_check_warnings: {}
  submitted_at: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  form_id:
    format: ID

  student_id:
    format: ID

  language_id:
    format: ID

  site_id:
    format: ID

measures:
  count:
    aggregate_type: count

ai_context: |
  One row per completed form submission (interest, enrollment, FabLab waiver, etc.). Joined to `people` via person_id; pair with `form_submission_answers` for per-question detail.
