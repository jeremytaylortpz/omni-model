# Reference this view as forms
ai_context: |
  Form definitions in the TPZ form engine (interest forms, enrollment forms, surveys, FabLab waivers, etc.). Parent of form_steps → form_questions → form_question_options.

schema: knowledge_management

dimensions:
  pipeline: {}
  name: {}
  slug: {}
  active: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  site_id:
    format: ID

measures:
  count:
    aggregate_type: count
