# Reference this view as survey_collectors
schema: knowledge_management

dimensions:
  name: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  sm_id:
    format: ID

  survey_id:
    format: ID

measures:
  count:
    aggregate_type: count

ai_context: |
  Survey collector instance — one survey can have multiple collection channels/links. Joined from `survey_responses.survey_collector_id`.
