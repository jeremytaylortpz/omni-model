# Reference this view as measurement_items
ai_context: |
  Item-level rows within a measurement (one row per question/item within an assessment administration).

schema: knowledge_management

dimensions:
  item_type: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  item_id:
    format: ID

  measurement_id:
    format: ID

measures:
  count:
    aggregate_type: count
