# Reference this view as form_steps
ai_context: |
  Pages/steps within a form definition. Joined from `forms`.

schema: knowledge_management

dimensions:
  position: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  form_id:
    format: ID

measures:
  count:
    aggregate_type: count
