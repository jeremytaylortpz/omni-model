# Reference this view as demographic_profiles
ai_context: |
  Self-reported demographic attributes (gender, ethnicity, free/reduced lunch, etc.) per person. One row per person; join to `people` on person_id.

schema: knowledge_management

dimensions:
  gender:
    sample_values:
      [
      Male,
      Female,
      Non-Binary,
      Other,
      Prefer not to say
      ]
  created_at: {}
  updated_at: {}
  ethnicity:
    sample_values:
      [
      Hispanic or Latino,
      Not Hispanic or Latino,
      Unknown
      ]

  id:
    format: ID
    primary_key: true

  person_id:
    format: ID

measures:
  count:
    aggregate_type: count
