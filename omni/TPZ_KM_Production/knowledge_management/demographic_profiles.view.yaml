# Reference this view as demographic_profiles
schema: knowledge_management

dimensions:
  gender: {}
  created_at: {}
  updated_at: {}
  ethnicity: {}

  id:
    format: ID
    primary_key: true

  person_id:
    format: ID

measures:
  count:
    aggregate_type: count

ai_context: |
  Self-reported demographic attributes (gender, ethnicity, free/reduced lunch, etc.) per person. One row per person; join to `people` on person_id.
