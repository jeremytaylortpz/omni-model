# Reference this view as term_sorting_v2
schema: knowledge_management
query:
  fields:
    terms.id: id
    terms.name: name
    terms.start_date: start_date
    calc_1: term_status
  base_view: terms
  calculations:
    calc_1:
      sql: CASE WHEN OMNI_FX_RANK(${terms.start_date},
        OMNI_OFFSET(${terms.start_date}, -536870911, 0, 1073741823, 1), 0)
        OMNI_FX_EQUALS 1 THEN 'Current' ELSE ${terms.name} END
      label: Term Status
  sorts:
    - field: terms.id

dimensions:
  id:
    format: ID
  start_date: {}
  term_status: {}

  name:
    order_by_field: start_date

measures:
  count:
    aggregate_type: count

ai_context: Preferred view for term display — includes dynamic sort order and
  current-term detection. Use term_sorting_v2.name for term labels in queries.
