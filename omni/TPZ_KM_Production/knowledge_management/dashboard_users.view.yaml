# Reference this view as dashboard_users
ai_context: |
  Users of the internal TPZ KM dashboard application. Operational — not for student-level analysis.

schema: knowledge_management

dimensions:
  username: {}
  email:
    hidden: true
  password_digest:
    hidden: true
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  saml_id:
    format: ID

  person_id:
    format: ID

measures:
  count:
    aggregate_type: count
