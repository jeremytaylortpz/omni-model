# Reference this view as languages
ai_context: |
  Reference lookup of languages (code and display name) used elsewhere for language preferences.

schema: knowledge_management

dimensions:
  native_name: {}
  english_name: {}
  created_at: {}
  updated_at: {}
  code: {}
  active: {}
  ui_strings: {}

  id:
    format: ID
    primary_key: true

measures:
  count:
    aggregate_type: count
