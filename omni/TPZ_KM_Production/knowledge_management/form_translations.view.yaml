# Reference this view as form_translations
ai_context: |
  Localized labels for form definitions. Typically excluded from AI analysis (UI metadata).

schema: knowledge_management

dimensions:
  name: {}
  description: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  form_id:
    format: ID

  language_id:
    format: ID

measures:
  count:
    aggregate_type: count
