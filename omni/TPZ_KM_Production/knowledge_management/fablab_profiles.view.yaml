# Reference this view as fablab_profiles
schema: knowledge_management

dimensions:
  educator: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  person_id:
    format: ID

  fabman_id:
    format: ID

  supersaas_id:
    format: ID

measures:
  count:
    aggregate_type: count

ai_context: |
  FabLab-program-specific profile attributes (waivers, badge id, training status) for users who access the FabLab. Join to `people` on person_id.
