# Reference this view as ec_es_subscale_mapping
schema: knowledge_management

dimensions:
  competency_type: {}
  competency_level: {}
  competency_tree: {}
  competency_name: {}
  sub_scale: {}
  survey_source: {}
  question_text: {}
  revised_question: {}
  weight: {}

  question_match_key:
    sql: |-
      LOWER(
        CASE
          WHEN LOCATE('HowmuchdoyoudisagreeoragreewitheachstatementEachstatementbeginswithIhavepeopleinmynetwork',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            90)
          WHEN LOCATE('Howmuchdoyoudisagreeoragreewitheachstatement',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            45)
          WHEN LOCATE('HowmuchdothesestatementssoundlikeadultsatTPZ',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            45)
          WHEN LOCATE('Howmuchdoyouagreewiththe',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            68)
          WHEN LOCATE('HowtruearethesestatementsaboutTPZ',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            34)
          WHEN ASCII(LEFT(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            1)) BETWEEN 97 AND 102
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            2)
          ELSE
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${ec_es_subscale_mapping.question_text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')
        END
      )
    description: Normalized match key derived from question_text. Strips HTML tags,
      known question prefixes, SAYO lettered prefixes, all punctuation, spaces,
      and lowercases the result. Use this field to join question text across
      different survey tables.

measures:
  count:
    aggregate_type: count

  question_match_key_count_distinct:
    sql: ${ec_es_subscale_mapping.question_match_key}
    description: "(Count Distinct) Question Match Key: Normalized match key derived
      from question_text. Strips HTML tags, known question prefixes, SAYO
      lettered prefixes, all punctuation, spaces, and lowercases the result. Use
      this field to join question text across different survey tables."
    aggregate_type: count_distinct
