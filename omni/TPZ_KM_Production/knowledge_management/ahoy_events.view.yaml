# Reference this view as ahoy_events
ai_context: |
  Application web-analytics event log (Ahoy gem) — page actions in the TPZ KM web app. Operational/product analytics; usually excluded from program-outcome analysis.

schema: knowledge_management

dimensions:
  name: {}
  properties: {}
  time: {}

  id:
    format: ID
    primary_key: true

  visit_id:
    format: ID

  dashboard_user_id:
    format: ID

measures:
  count:
    aggregate_type: count
