# Reference this view as omni__term_sorting
label: 📆 Term Sorting

schema: knowledge_management
query:
  fields:
    terms.name: name
    terms.start_date[date]: start_date_date
  base_view: terms
  filters:
    terms.name:
      not: [ " 2020", 2021-2022, Multi-Term ]
    terms.start_date:
      on_or_after: 2022-04-01
  sorts:
    - field: terms.start_date[date]

dimensions:
  name: {}
  start_date_date: {}

measures:
  count:
    aggregate_type: count
