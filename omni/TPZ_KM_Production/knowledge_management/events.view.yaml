# Reference this view as events
ai_context: |
  Standalone (non-course) events — workshops, info sessions, demo days. Joined to `registrations` via `context_type='Event'`.

schema: knowledge_management

dimensions:
  title: {}
  description: {}
  start: {}
  end: {}
  created_at: {}
  updated_at: {}
  stipended: {}

  id:
    format: ID
    primary_key: true

measures:
  count:
    aggregate_type: count
