# Reference this view as people
schema: knowledge_management

dimensions:
  first_name: {}
  middle_name: {}
  last_name: {}
  preferred_name: {}
  created_at: {}
  updated_at: {}

  date_of_birth:
    timeframes: [ raw, date, week, month, quarter, year, month_name ]

  id:
    format: ID
    primary_key: true

  full_name:
    sql: CONCAT(${people.first_name}, ' ', ${people.last_name})
    label: Full Name
    ai_context: Student full name (first + last). Use this as the canonical name
      field. Do not expose in aggregate reporting per model rules.

  calculation:
    sql: CONCAT(COALESCE(CONCAT(COALESCE(${people.first_name}, ''), ' '), ''),
      COALESCE(${people.last_name}, ''))
    label: Calculation
    hidden: true

  student_name:
    sql: CONCAT(COALESCE(CONCAT(COALESCE(${people.first_name}, ''), ' '), ''),
      COALESCE(${people.last_name}, ''))
    label: Student Name
    format: ""
    hidden: true

measures:
  count:
    aggregate_type: count

  id_count_distinct:
    sql: ${people.id}
    aggregate_type: count_distinct
    ai_context: Distinct student count. Prefer this over people.count for unique
      student counts when joins may cause duplicates.

  id_count_distinct_1:
    sql: ${people.id}
    label: Count of Unique Juniors
    format: NUMBER_0
    aggregate_type: count_distinct

ai_context: |
  Canonical person registry: one row per individual TPZ interacts with (students, alumni, parents/guardians, contacts, staff). `id` (a.k.a. `person_id` on other views) is the universal student/person key across the model. PII fields (first_name, last_name, full_name) must be hidden in aggregate reporting per the model.yaml rule.
