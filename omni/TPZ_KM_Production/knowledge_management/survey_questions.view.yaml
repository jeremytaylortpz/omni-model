# Reference this view as survey_questions
schema: knowledge_management

dimensions:
  text: {}
  active: {}
  select_name: {}
  created_at: {}
  updated_at: {}

  id:
    format: ID
    primary_key: true

  sm_id:
    format: ID

  sub_sm_id:
    format: ID

  survey_id:
    format: ID

  survey_section_id:
    format: ID

  question_type_id:
    format: ID

  question_map:
    sql: REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},
      '"', ''), '{', ''), '}', ''), 'heading=>', ''), ' ', ''), '.', ''), '(',
      ''), ')', ''), ',', '')
    label: Question Map

  question_match_key:
    sql: |-
      LOWER(
        CASE
          WHEN LOCATE('HowmuchdoyoudisagreeoragreewitheachstatementEachstatementbeginswithIhavepeopleinmynetwork',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            90)
          WHEN LOCATE('Howmuchdoyoudisagreeoragreewitheachstatement',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            45)
          WHEN LOCATE('HowmuchdothesestatementssoundlikeadultsatTPZ',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            45)
          WHEN LOCATE('Howmuchdoyouagreewiththe',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            68)
          WHEN LOCATE('HowtruearethesestatementsaboutTPZ',
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')) = 1
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            34)
          WHEN ASCII(LEFT(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            1)) BETWEEN 97 AND 102
          THEN SUBSTRING(
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', ''),
            2)
          ELSE
            REGEXP_REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(${survey_questions.text},'<br>',''),'<BR>',''),'<br/>',''),'<BR/>',''), '[^a-zA-Z0-9]', '')
        END
      )
    description: Normalized match key derived from question_text. Strips HTML tags,
      known question prefixes, SAYO lettered prefixes, all punctuation, spaces,
      and lowercases the result. Use this field to join question text across
      different survey tables.

measures:
  count:
    aggregate_type: count

ai_context: |
  Question bank for surveys, keyed by `id`. Joined to `question_taxonomy` for competency/domain/scoring metadata.
