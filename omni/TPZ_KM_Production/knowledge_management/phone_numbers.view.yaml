# Reference this view as phone_numbers
ai_context: |
  Phone contact records linked to a person; a person may have multiple. Hide raw numbers in aggregate reporting (PII).

schema: knowledge_management

dimensions:
  phone_number:
    hidden: true
  allow_sms: {}
  created_at: {}
  updated_at: {}
  phone_type: {}
  extension:
    hidden: true
  preferred: {}

  id:
    format: ID
    primary_key: true

measures:
  count:
    aggregate_type: count
