# Reference this view as languages_people
schema: knowledge_management

dimensions:
  id:
    format: ID
    primary_key: true

  person_id:
    format: ID

  language_id:
    format: ID

measures:
  count:
    aggregate_type: count

ai_context: |
  Many-to-many join between `people` and `languages` capturing the language(s) a person speaks.
