# Reference this view as first_term_per_student
description: Winter and Spring are mid-year, so their cutoff is Fall of the SAME year.

query:
  fields:
    all_student_terms.person_id: person_id
    first_term_name: ""
    first_season: ""
    first_term_year: ""
    first_term_start: ""
    retention_cutoff_date: ""
    __omni_silent_group: ""
  base_view: all_student_terms
  calculations:
    rn:
      sql: ROW_NUMBER() OVER (PARTITION BY ${all_student_terms.person_id} ORDER BY
        ${all_student_terms.term_start_date})
    first_term_name:
      sql: ${all_student_terms.term_name}
      can_reference_unselected: true
    first_season:
      sql: ${all_student_terms.season}
      can_reference_unselected: true
    first_term_year:
      sql: ${all_student_terms.term_year}
      can_reference_unselected: true
    first_term_start:
      sql: ${all_student_terms.term_start_date}
      can_reference_unselected: true
    retention_cutoff_date:
      sql: CASE WHEN ${all_student_terms.season} IN ('Winter', 'Spring') THEN CASE
        WHEN ${all_student_terms.term_year} = 2021 THEN '2021-09-01' WHEN
        ${all_student_terms.term_year} = 2022 THEN '2022-09-01' WHEN
        ${all_student_terms.term_year} = 2023 THEN '2023-09-01' WHEN
        ${all_student_terms.term_year} = 2024 THEN '2024-09-01' WHEN
        ${all_student_terms.term_year} = 2025 THEN '2025-09-01' ELSE NULL END
        ELSE CASE WHEN ${all_student_terms.term_year} = 2021 THEN '2022-09-01'
        WHEN ${all_student_terms.term_year} = 2022 THEN '2023-09-01' WHEN
        ${all_student_terms.term_year} = 2023 THEN '2024-09-01' WHEN
        ${all_student_terms.term_year} = 2024 THEN '2025-09-01' WHEN
        ${all_student_terms.term_year} = 2025 THEN '2026-09-01' ELSE NULL END
        END
      can_reference_unselected: true
    __omni_silent_group:
      sql: OMNI_SILENT_GROUP(${all_student_terms.term_name},
        ${all_student_terms.season}, ${all_student_terms.term_year},
        ${all_student_terms.term_start_date})
      can_reference_unselected: true
  default_group_by: false
  filters:
    rn:
      is: 1
    first_term_name:
      and:
        - not: null
        - contains: " 20"
          case_insensitive: true

dimensions:
  person_id: {}
  first_term_name: {}
  first_season: {}
  first_term_year: {}
  first_term_start: {}
  retention_cutoff_date: {}

measures:
  retained:
    sql: CASE WHEN ${all_student_terms.term_start_date} >=
      ${first_term_per_student.retention_cutoff_date} THEN 1 ELSE 0 END
    aggregate_type: max
