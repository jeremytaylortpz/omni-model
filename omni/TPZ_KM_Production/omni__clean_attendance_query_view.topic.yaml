base_view: omni__clean_attendance_query_view
label: Student Demographics

fields:
  [
    all_views.*,
    -dashboard_users.*,
    -course_interests.*,
    alumni_profiles.*,
    -contact_orders.*,
    action_types.*,
    -omni__clean_attendance_query_view.att_P,
    -omni__clean_attendance_query_view.att_H,
    -omni__clean_attendance_query_view.att_A
  ]
ai_fields:
  [
    omni__clean_attendance_query_view.*,
    -omni__clean_attendance_query_view.att_P,
    -omni__clean_attendance_query_view.att_H,
    -omni__clean_attendance_query_view.att_A,
    people.id,
    people.date_of_birth,
    -people.first_name,
    -people.last_name,
    -people.full_name,
    -people.middle_name,
    -people.preferred_name,
    -people.calculation,
    -people.student_name,
    student_profiles.current_grade,
    student_profiles.school,
    student_profiles.iep,
    student_profiles.first_gen_college,
    student_profiles.pronouns,
    student_profiles.dismissed,
    student_profiles.school_release_consent,
    student_profiles.enrollment_form_most_recent_status,
    student_profiles.interest_form_most_recent_status,
    student_profiles.latest_term,
    student_profiles.esl,
    schools.name,
    schools.name_groups,
    schools.is_target_school,
    school_tiers.name,
    registrations.active,
    registrations.context_type,
    registrations.person_id,
    demographic_profiles.*,
    races.name,
    races.*,
    alumni_profiles.*,
    action_types.*,
    pathways_profiles.*,
    most_recent_ef_by_student.release_media_groups,
    most_recent_ef_by_student.term_name,
    courses.course_code,
    courses.friendly_name,
    courses.max_days,
    courses.exclude_course,
    schedules.*,
    terms.name,
    terms.start_date,
    terms.end_date,
    terms.year,
    interest_forms.has_interest_form,
    interest_forms.referral_source,
    interest_forms.person_id,
    interest_forms.submitted_at,
    interest_forms.term_name,
    interest_forms.term_year,
    enrollment_forms.has_enrollment_form,
    enrollment_forms.term_name,
    enrollment_forms.term_year,
    enrollment_forms.submitted_at,
    enrollment_forms.person_id,
    enrollment_forms.student_grade,
    enrollment_forms.student_school,
    languages.name,
    languages_people.*,
    latest_enrollment_forms.*
  ]

joins:
  people:
    interest_forms: {}
    student_profiles:
      schools:
        school_tiers: {}
    registrations: {}
    course_interests: {}
    demographic_profiles:
      races: {}
    languages_people:
      languages: {}
    person_actions:
      action_types: {}
      roles:
        contact_orders: {}
    pathways_profiles: {}
    alumni_profiles: {}
    enrollment_forms: {}
    dashboard_users: {}
    most_recent_ef_by_student: {}
  courses:
    schedules: {}
    terms: {}

views:
  omni__clean_attendance_query_view:
    dimensions:
      att_pct_level_of_detail:
        sql: ${omni__clean_attendance_query_view.att_pct}
        label: Att Pct Level of Detail
        level_of_detail:
          aggregate_type: sum
          fixed: [ omni__clean_attendance_query_view.course_code ]

relationships:
  - join_from_view: omni__clean_attendance_query_view
    join_to_view: latest_enrollment_forms
    join_type: always_left
    on_sql: ${latest_enrollment_forms.person_id} =
      ${omni__clean_attendance_query_view.person_id} AND
      ${latest_enrollment_forms.term_name} =
      ${omni__clean_attendance_query_view.term_name}
    relationship_type: many_to_one

ai_context: |
  Deduplicated attendance joined to the full student-demographic surface. Grain: one row per student × course × date (use this rather than raw `student_attendances` for analysis). Joined to people, student_profiles, schools, school_tiers, demographic_profiles, races, languages, alumni_profiles, person_actions, enrollment_forms, and more — use for demographic breakdowns of attendance, retention, enrollment, and drop metrics. Aggregate carefully when joining 1:many fields (languages_people, person_actions) to avoid row inflation. `latest_enrollment_forms` is joined many_to_one on (person_id, term_name). See the `Cleaned Student Attendances` topic for the AI-focused variant of this surface.
